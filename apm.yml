name: agent-council
version: 0.1.0
description: Runtime-portable 5-agent quality gate for tier-1 text artifacts. Five role-conditioned LLM deliberators (Skeptic, Voice & Identity, Evidence & Calibration, Strategy & Stakes, Adjudicator) run in a 2-round async protocol with cross-read rebuttal. Returns one verdict — SHIP, REVISE, or HOLD — plus a revision brief and a full audit transcript. Install once, use across every compatible agent harness via APM.

